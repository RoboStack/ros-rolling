# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-rolling-rviz-rendering
  version: 15.2.2
source:
  git: https://github.com/ros2-gbp/rviz-release.git
  tag: release/rolling/rviz_rendering/15.2.2-2
  target_directory: ros-rolling-rviz-rendering/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 19
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://github.com/ros2/rviz/blob/ros2/README.md
  repository: https://github.com/ros2/rviz
  license: BSD-3-Clause
  summary: Library which provides the 3D rendering functionality in rviz.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - assimp
    - if: build_platform == target_platform
      then:
        - pkg-config
    - eigen
    - glew
    - libgl-devel
    - libopengl-devel
    - numpy
    - pip
    - python
    - qt6-main
    - ros-rolling-ament-cmake-gmock
    - ros-rolling-ament-cmake-gtest
    - ros-rolling-ament-cmake-ros
    - ros-rolling-ament-index-cpp
    - ros-rolling-ament-lint-auto
    - ros-rolling-ament-lint-common
    - ros-rolling-eigen3-cmake-module
    - ros-rolling-resource-retriever
    - ros-rolling-ros-environment
    - ros-rolling-ros-workspace
    - ros-rolling-rviz-ogre-vendor
    - ros2-distro-mutex 0.15.* rolling_*
  run:
    - assimp
    - eigen
    - libgl-devel
    - libopengl-devel
    - python
    - qt6-main
    - ros-rolling-ament-index-cpp
    - ros-rolling-eigen3-cmake-module
    - ros-rolling-resource-retriever
    - ros-rolling-ros-workspace
    - ros-rolling-rviz-ogre-vendor
    - ros2-distro-mutex 0.15.* rolling_*
